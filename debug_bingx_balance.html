<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug BingX Balance - ProfitMaker</title>
    <script src="https://unpkg.com/ccxt@4.2.25/dist/ccxt.browser.js"></script>
    <style>
        body {
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
            background-color: #0a0a0a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            line-height: 1.4;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: #00ff88;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }

        .section {
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            margin: 20px 0;
            padding: 20px;
        }

        .form-group {
            margin: 15px 0;
        }

        label {
            display: block;
            color: #888;
            margin-bottom: 5px;
        }

        input, select {
            background: #222;
            border: 1px solid #444;
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            width: 300px;
        }

        button {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px 5px 5px 0;
        }

        button:hover {
            background: #00cc70;
        }

        button:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
        }

        .log {
            background: #000;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            font-size: 12px;
            white-space: pre-wrap;
        }

        .success { color: #00ff88; }
        .error { color: #ff4444; }
        .warning { color: #ffaa00; }
        .info { color: #44aaff; }

        .balance-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .balance-item {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 10px;
            border-radius: 4px;
        }

        .balance-currency {
            color: #00ff88;
            font-weight: bold;
        }

        .balance-amounts {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐕‍🦺 Debug BingX Balance - ProfitMaker</h1>
        
        <div class="section">
            <h3>📊 BingX CCXT Connection Test</h3>
            <div class="form-group">
                <label for="apiKey">API Key:</label>
                <input type="password" id="apiKey" placeholder="Введите API ключ BingX">
            </div>
            <div class="form-group">
                <label for="secret">Secret Key:</label>
                <input type="password" id="secret" placeholder="Введите Secret ключ BingX">
            </div>
            <div class="form-group">
                <label for="sandbox">Environment:</label>
                <select id="sandbox">
                    <option value="false">Production</option>
                    <option value="true">Sandbox</option>
                </select>
            </div>
            <div class="form-group">
                <label for="walletType">Wallet Type:</label>
                <select id="walletType">
                    <option value="spot">Spot Trading</option>
                    <option value="funding">Funding</option>
                    <option value="futures">Futures</option>
                    <option value="margin">Margin</option>
                </select>
            </div>
            <button onclick="testConnection()">🔍 Test Connection</button>
            <button onclick="fetchBalance()">💰 Fetch Balance</button>
            <button onclick="fetchMarkets()">📈 Fetch Markets</button>
            <button onclick="clearLog()">🧹 Clear Log</button>
        </div>

        <div class="section">
            <h3>📋 Debug Log</h3>
            <div id="log" class="log">Ready to test BingX connection...\n</div>
        </div>

        <div class="section" id="balanceSection" style="display: none;">
            <h3>💰 Balance Results</h3>
            <div id="balanceResults"></div>
        </div>

        <div class="section" id="marketsSection" style="display: none;">
            <h3>📈 Markets Results</h3>
            <div id="marketsResults"></div>
        </div>
    </div>

    <script>
        let bingxInstance = null;

        function log(message, type = 'info') {
            const logElement = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const classes = {
                'success': 'success',
                'error': 'error',
                'warning': 'warning',
                'info': 'info'
            };
            const className = classes[type] || 'info';
            
            logElement.innerHTML += `<span class="${className}">[${timestamp}] ${message}</span>\n`;
            logElement.scrollTop = logElement.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = 'Log cleared...\n';
        }

        async function testConnection() {
            const apiKey = document.getElementById('apiKey').value;
            const secret = document.getElementById('secret').value;
            const sandbox = document.getElementById('sandbox').value === 'true';

            if (!apiKey || !secret) {
                log('❌ API Key и Secret обязательны для тестирования', 'error');
                return;
            }

            try {
                log('🔄 Создание BingX CCXT instance...', 'info');
                
                if (!window.ccxt || !window.ccxt.bingx) {
                    log('❌ CCXT library или BingX не найден', 'error');
                    return;
                }

                const config = {
                    apiKey: apiKey,
                    secret: secret,
                    sandbox: sandbox,
                    enableRateLimit: true,
                    timeout: 30000,
                };

                log(`🔍 Конфигурация: sandbox=${sandbox}, timeout=${config.timeout}ms`, 'info');
                
                bingxInstance = new ccxt.bingx(config);
                
                log('✅ BingX instance создан успешно', 'success');
                log(`🔍 Поддерживаемые возможности:`, 'info');
                
                // Проверяем возможности
                const capabilities = bingxInstance.has;
                const supportedFeatures = [];
                
                if (capabilities.fetchBalance) supportedFeatures.push('fetchBalance');
                if (capabilities.fetchTicker) supportedFeatures.push('fetchTicker');
                if (capabilities.fetchMarkets) supportedFeatures.push('fetchMarkets');
                if (capabilities.fetchOHLCV) supportedFeatures.push('fetchOHLCV');
                if (capabilities.fetchTrades) supportedFeatures.push('fetchTrades');
                if (capabilities.fetchOrderBook) supportedFeatures.push('fetchOrderBook');

                log(`✅ Поддерживает: ${supportedFeatures.join(', ')}`, 'success');

                // Проверяем подключение через loadMarkets
                log('🔄 Проверка подключения через loadMarkets...', 'info');
                await bingxInstance.loadMarkets();
                
                const marketCount = Object.keys(bingxInstance.markets).length;
                log(`✅ Подключение успешно! Загружено ${marketCount} рынков`, 'success');

            } catch (error) {
                log(`❌ Ошибка создания instance: ${error.message}`, 'error');
                console.error('BingX connection error:', error);
                bingxInstance = null;
            }
        }

        async function fetchBalance() {
            if (!bingxInstance) {
                log('❌ Сначала создайте подключение', 'error');
                return;
            }

            const walletType = document.getElementById('walletType').value;
            
            try {
                log(`🔄 Загрузка баланса для кошелька: ${walletType}...`, 'info');

                // Устанавливаем defaultType в зависимости от типа кошелька
                if (walletType === 'futures') {
                    bingxInstance.options.defaultType = 'future';
                } else if (walletType === 'margin') {
                    bingxInstance.options.defaultType = 'margin';
                } else {
                    bingxInstance.options.defaultType = 'spot';
                }

                log(`🔍 Используем defaultType: ${bingxInstance.options.defaultType}`, 'info');

                const balance = await bingxInstance.fetchBalance();
                
                if (!balance) {
                    log('⚠️ Получен пустой баланс', 'warning');
                    return;
                }

                log('✅ Баланс получен успешно!', 'success');
                log(`🔍 Timestamp: ${balance.timestamp}`, 'info');
                log(`🔍 DateTime: ${balance.datetime}`, 'info');

                // Фильтруем валюты с ненулевыми балансами
                const nonZeroBalances = Object.entries(balance)
                    .filter(([currency, data]) => 
                        currency !== 'info' && 
                        currency !== 'datetime' && 
                        currency !== 'timestamp' &&
                        data && 
                        typeof data === 'object' && 
                        (data.total > 0 || data.free > 0 || data.used > 0)
                    );

                log(`💰 Найдено ${nonZeroBalances.length} валют с ненулевым балансом`, 'success');

                // Отображаем результаты
                displayBalance(nonZeroBalances);

            } catch (error) {
                log(`❌ Ошибка получения баланса: ${error.message}`, 'error');
                console.error('Balance fetch error:', error);
                
                if (error.message.includes('permissions')) {
                    log('⚠️ Возможно недостаточно прав API ключа', 'warning');
                }
            }
        }

        function displayBalance(balances) {
            const section = document.getElementById('balanceSection');
            const results = document.getElementById('balanceResults');
            
            if (balances.length === 0) {
                results.innerHTML = '<p>Нет валют с ненулевым балансом</p>';
                section.style.display = 'block';
                return;
            }

            let html = '<div class="balance-grid">';
            
            balances.forEach(([currency, data]) => {
                html += `
                    <div class="balance-item">
                        <div class="balance-currency">${currency}</div>
                        <div class="balance-amounts">
                            Free: ${data.free || 0}<br>
                            Used: ${data.used || 0}<br>
                            Total: ${data.total || 0}
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            results.innerHTML = html;
            section.style.display = 'block';
        }

        async function fetchMarkets() {
            if (!bingxInstance) {
                log('❌ Сначала создайте подключение', 'error');
                return;
            }

            try {
                log('🔄 Загрузка списка рынков...', 'info');
                
                await bingxInstance.loadMarkets();
                const markets = bingxInstance.markets;
                
                const marketsList = Object.keys(markets);
                log(`✅ Загружено ${marketsList.length} рынков`, 'success');

                // Группируем по типам
                const marketTypes = {};
                marketsList.forEach(symbol => {
                    const market = markets[symbol];
                    const type = market.type || 'unknown';
                    if (!marketTypes[type]) marketTypes[type] = [];
                    marketTypes[type].push(symbol);
                });

                log(`📊 Типы рынков:`, 'info');
                Object.entries(marketTypes).forEach(([type, symbols]) => {
                    log(`  ${type}: ${symbols.length} рынков`, 'info');
                });

                // Показываем примеры рынков
                const examples = marketsList.slice(0, 10);
                log(`📈 Примеры рынков: ${examples.join(', ')}`, 'info');

                displayMarkets(marketTypes);

            } catch (error) {
                log(`❌ Ошибка получения рынков: ${error.message}`, 'error');
                console.error('Markets fetch error:', error);
            }
        }

        function displayMarkets(marketTypes) {
            const section = document.getElementById('marketsSection');
            const results = document.getElementById('marketsResults');
            
            let html = '<div class="balance-grid">';
            
            Object.entries(marketTypes).forEach(([type, symbols]) => {
                html += `
                    <div class="balance-item">
                        <div class="balance-currency">${type.toUpperCase()}</div>
                        <div class="balance-amounts">
                            Markets: ${symbols.length}<br>
                            Examples: ${symbols.slice(0, 3).join(', ')}${symbols.length > 3 ? '...' : ''}
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            results.innerHTML = html;
            section.style.display = 'block';
        }

        // Автоматический тест на загрузке
        window.addEventListener('load', () => {
            log('🚀 Debug page loaded. CCXT version: ' + (window.ccxt ? window.ccxt.version : 'not found'), 'info');
            log('🔍 BingX exchange available: ' + (window.ccxt && window.ccxt.bingx ? 'Yes' : 'No'), 'info');
        });
    </script>
</body>
</html>
